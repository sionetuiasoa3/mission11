# Deploys this repo to the Azure Static Web App created as "white-smoke-05fd5c10f".
# Secret in GitHub: AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SMOKE_05FD5C10F (from Azure → SWA → Manage deployment token).
# Vite output must be built on the runner; Oryx-only deploy from ./frontend does not produce a usable dist/.

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - phase6
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - phase6
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SMOKE_05FD5C10F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SMOKE_05FD5C10F }}
          action: close
