# Deploy React (Vite) frontend to Azure Static Web Apps.
# API stays on App Service (Kudu); api_location is empty.
# GitHub: Settings → Secrets → add token from Azure Static Web App → Manage deployment token.
# If Azure created a longer secret name (e.g. AZURE_STATIC_WEB_APPS_API_TOKEN_xxx), use that name below.

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - phase6
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - phase6
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Pre-built output: app_location = artifact folder, output_location empty (see MS docs: skip_app_build)
          app_location: frontend/dist
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
